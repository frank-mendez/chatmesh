services:
  server1:
    build: .
    environment:
      - SERVER_ID=server-1
    ports:
      - "8081:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/instance"]
      interval: 10s
      timeout: 3s
      retries: 3

  server2:
    build: .
    environment:
      - SERVER_ID=server-2
    ports:
      - "8082:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/instance"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server1
      - server2
    restart: unless-stopped
