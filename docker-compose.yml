services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  server1:
    build: .
    environment:
      - SERVER_ID=server-1
      - REDIS_URL=redis://redis:6379
    ports:
      - "8081:8080"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/instance"]
      interval: 10s
      timeout: 3s
      retries: 3

  server2:
    build: .
    environment:
      - SERVER_ID=server-2
      - REDIS_URL=redis://redis:6379
    ports:
      - "8082:8080"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/instance"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      server1:
        condition: service_healthy
      server2:
        condition: service_healthy
    restart: unless-stopped
