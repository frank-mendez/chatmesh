events {}

http {
    upstream chatmesh {
        # default: round-robin
        server server1:8080;
        server server2:8080;
    }

    server {
        listen 80;

        location /ws {
            proxy_pass         http://chatmesh;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_buffering    off;
        }

        location /instance {
            proxy_pass http://chatmesh;
        }
    }
}
